<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Figtree', sans-serif;
  width: 960px;
  height: 480px;
  overflow: hidden;
  position: relative;
}

/* ── Blurred bg ── */
#bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: blur(70px) brightness(0.35) saturate(2.2);
  transform: scale(1.3); transition: background-image 2s ease; z-index: 0;
}

/* ── Pages ── */
.pages { position: relative; z-index: 2; width: 100%; height: 100%; }
.page {
  position: absolute; inset: 0; display: flex;
  width: 100%; height: 100%; opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.page.active { opacity: 1; pointer-events: all; }

/* PAGE 1 */
.left-col {
  width: 380px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px 20px 24px 36px; gap: 20px;
}
#art-wrap {
  width: 290px; height: 290px; border-radius: 16px; overflow: hidden;
  background: #1e1e1e; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9); flex-shrink: 0;
}
.transport { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
.right-col {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 28px 40px 24px 10px; min-width: 0; gap: 14px;
}
.top-bar { display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; margin-bottom: 0; }
.datetime { display: flex; flex-direction: column; gap: 0; }
.date-label { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.4); letter-spacing: 0.6px; text-transform: uppercase; line-height: 1; }
.time-label { font-size: 72px; font-weight: 300; letter-spacing: -3px; line-height: 1; margin-top: 2px; }
.weather-block { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; padding-top: 8px; }
.w-line1 { display: flex; align-items: center; gap: 6px; }
.w-icon  { font-size: 26px; line-height: 1; }
.w-temp  { font-size: 30px; font-weight: 400; letter-spacing: -0.5px; }
.w-desc  { font-size: 13px; color: rgba(255,255,255,0.42); text-transform: capitalize; text-align: right; }
.bottom-group { display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; margin-top: 22px; }
.track-block { min-width: 0; }
.track-name { font-size: 50px; font-weight: 800; letter-spacing: -2px; line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-meta { display: flex; align-items: center; gap: 6px; margin-top: 8px; min-width: 0; }
.track-artist { font-size: 22px; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; }
.meta-dot { font-size: 13px; color: rgba(255,255,255,0.28); flex-shrink: 0; }
.track-album { font-size: 22px; color: rgba(255,255,255,0.35); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 2; }

/* Scrubber */
.scrubber-track { width: 100%; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; position: relative; cursor: pointer; }
.scrubber-fill { height: 100%; background: #fff; border-radius: 2px; width: 0%; pointer-events: none; }
.scrubber-fill.instant { transition: none; }
.scrubber-fill:not(.instant) { transition: width 0.25s linear; }
.scrubber-thumb { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 12px; height: 12px; background: #fff; border-radius: 50%; pointer-events: none; left: 0%; }
.bar-times { display: flex; justify-content: space-between; margin-top: 5px; }
.bar-times span { font-size: 10px; color: rgba(255,255,255,0.35); }
.bottom-row { display: flex; align-items: center; justify-content: flex-start; gap: 4px; flex-shrink: 0; }
.progress-wrap { width: 100%; flex-shrink: 0; }
.device-label { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.3px; }
.device-label span { color: rgba(255,255,255,0.4); }
.not-playing { color: rgba(255,255,255,0.22); font-weight: 300; }
.lyrics-status-msg { font-size: 14px; color: rgba(255,255,255,0.35); padding: 4px; }

/* Queue panel */
#queue-backdrop { position: fixed; inset: 0; z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
#queue-backdrop.open { opacity: 1; pointer-events: all; }
#queue-panel {
  position: fixed; top: 0; right: -40vw; bottom: 0;
  width: 38vw; min-width: 260px; max-width: 380px;
  background: rgba(12,12,12,0.96); backdrop-filter: blur(20px);
  border-left: 1px solid rgba(255,255,255,0.08); z-index: 100;
  display: flex; flex-direction: column; transition: right 0.32s cubic-bezier(0.4,0,0.2,1);
}
#queue-panel.open { right: 0; }
.queue-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.queue-title { font-size: 14px; font-weight: 600; }
.queue-close { background: none; border: none; color: rgba(255,255,255,0.45); font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; }
.queue-close:hover { color: #fff; }
#queue-list { flex: 1; overflow-y: auto; padding: 6px 0; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
.queue-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; cursor: default; transition: background 0.15s; }
.queue-item:hover { background: rgba(255,255,255,0.05); }
.queue-item-art { width: 38px; height: 38px; border-radius: 5px; background: #2a2a2a; flex-shrink: 0; overflow: hidden; }
.queue-item-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.queue-item-info { min-width: 0; flex: 1; }
.queue-item-title { font-size: 13px; font-weight: 500; white-space: normal; word-break: break-word; line-height: 1.3; }
.queue-item-artist { font-size: 11px; color: rgba(255,255,255,0.4); white-space: normal; word-break: break-word; margin-top: 2px; }
.queue-now { color: #1DB954; }

/* Volume popup */
#vol-popup {
  position: absolute; top: 50%; left: 100%;
  transform: translateY(-50%) scaleX(0); transform-origin: left center;
  display: flex; align-items: center; padding: 0 6px;
  width: 150px; height: 36px; opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease; z-index: 10; margin-left: 8px;
}
#vol-popup.open { opacity: 1; pointer-events: all; transform: translateY(-50%) scaleX(1); }
#vol-popup-lyrics {
  position: relative; display: flex; align-items: center; padding: 0 6px;
  width: 120px; height: 36px; opacity: 0; pointer-events: none;
  transform: scaleX(0); transform-origin: left center;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
#vol-popup-lyrics.open { opacity: 1; pointer-events: all; transform: scaleX(1); }

/* Volume slider */
.vol-custom-track { width: 100%; height: 28px; position: relative; cursor: pointer; flex-shrink: 0; }
.vol-track-line { position: absolute; left: 0; right: 0; top: 12px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }
.vol-custom-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: #fff; border-radius: 2px; pointer-events: none; }
.vol-custom-thumb {
  position: absolute; top: 12px; margin-top: -5px;
  width: 14px; height: 14px; background: #fff; border-radius: 50%;
  pointer-events: none; left: 50%; margin-left: -7px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* PAGE 2 — Lyrics */
#page-lyrics { background: rgba(0,0,0,0.15); }
.lyr-left {
  width: 288px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px 12px 20px 20px; min-height: 0; gap: 8px;
}
#art-wrap-lyrics { width: 200px; height: 200px; border-radius: 10px; overflow: hidden; background: #1e1e1e; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 40px rgba(0,0,0,0.9); flex-shrink: 0; margin-top: 8px; margin-bottom: 20px; }
.lyr-track-block { width: 100%; min-width: 0; display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
.lyr-title-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.lyr-track-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.lyr-track-artist, .lyr-track-album { display: none; }
.lyr-meta-row { font-size: 12px; color: rgba(255,255,255,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.lyr-scrubber-wrap { width: 100%; flex-shrink: 0; }
.lyr-transport { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 0; }
.lyr-bottom-row { display: flex; align-items: center; justify-content: space-between; width: 100%; flex-shrink: 0; gap: 6px; position: relative; }
.vol-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; opacity: 0.45; transition: opacity 0.15s, transform 0.1s; border-radius: 50%; }
.vol-btn:hover { opacity: 1; }
.vol-btn:active { transform: scale(0.85); }
.vol-btn svg { fill: #fff; display: block; }
.vol-btn.active { opacity: 1; }

.lyr-right { flex: 1; display: flex; flex-direction: column; padding: 14px 24px 14px 6px; min-width: 0; min-height: 0; overflow: hidden; gap: 0; }
.lyr-time { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.45); text-align: right; flex-shrink: 0; margin-bottom: 6px; letter-spacing: -0.5px; }
.lyr-scroll-wrap { flex: 1; overflow: hidden; position: relative; min-height: 0; }
.lyr-scroll-wrap::before, .lyr-scroll-wrap::after { content: ''; position: absolute; left: 0; right: 0; height: 36px; z-index: 2; pointer-events: none; }
.lyr-scroll-wrap::before { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); }
.lyr-scroll-wrap::after  { bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.5), transparent); }
#lyrics-inner { height: 100%; overflow-y: scroll; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 0; padding: 60px 4px; scrollbar-width: none; -ms-overflow-style: none; }
#lyrics-inner::-webkit-scrollbar { display: none; }
.lyric-line { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.2); line-height: 1.65; padding: 2px 4px; flex-shrink: 0; transition: color 0.3s ease, font-size 0.3s ease, font-weight 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.lyric-line.near  { color: rgba(255,255,255,0.45); }
.lyric-line.active { color: #fff; font-size: 22px; font-weight: 700; }

/* Shared buttons */
.ctrl-btn { background: none; border: none; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; opacity: 0.45; transition: opacity 0.15s, transform 0.1s; border-radius: 50%; position: relative; }
.ctrl-btn:hover  { opacity: 1; }
.ctrl-btn:active { transform: scale(0.85); }
.ctrl-btn svg    { fill: #fff; display: block; }
.ctrl-btn.play-btn { opacity: 1; }
.ctrl-btn.shuffle-on { opacity: 1; }
.ctrl-btn.shuffle-on svg { fill: #1DB954; }
.ctrl-btn.shuffle-on::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #1DB954; }
.ctrl-btn.loop-on { opacity: 1; }
.ctrl-btn.loop-on svg { fill: #1DB954; }
.ctrl-btn.loop-on::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #1DB954; }
.ctrl-btn.liked svg { fill: #1DB954; }
.ctrl-btn.liked     { opacity: 1; }
.lyrics-btn { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 7px 16px; cursor: pointer; color: #fff; font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 500; opacity: 0.72; transition: opacity 0.15s, background 0.15s; letter-spacing: 0.2px; }
.lyrics-btn:hover { opacity: 1; }
.lyrics-btn.active { background: rgba(255,255,255,0.20); border-color: rgba(255,255,255,0.38); opacity: 1; }
.lyrics-btn svg { fill: #fff; flex-shrink: 0; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="queue-backdrop" onclick="toggleQueue()"></div>
<div id="queue-panel">
  <div class="queue-header">
    <span class="queue-title">Next Up</span>
    <button class="queue-close" onclick="toggleQueue()">✕</button>
  </div>
  <div id="queue-list"><div style="padding:20px;color:rgba(255,255,255,0.3);font-size:13px;">Loading queue…</div></div>
</div>

<div class="pages">
  <!-- PAGE 1: NOW PLAYING -->
  <div class="page active" id="page-main">
    <div class="left-col">
      <div id="art-wrap">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="rgba(255,255,255,0.1)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <div class="transport">
        <button class="ctrl-btn" onclick="prevTrack()"><svg width="42" height="42" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button class="ctrl-btn play-btn" onclick="togglePlay()"><svg id="play-icon" width="52" height="52" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="ctrl-btn" onclick="nextTrack()"><svg width="42" height="42" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      </div>
    </div>
    <div class="right-col">
      <div class="top-bar">
        <div class="datetime">
          <div class="date-label" id="date">Sunday, March 15</div>
          <div class="time-label" id="time">12:00 AM</div>
        </div>
        <div class="weather-block">
          <div class="w-line1"><span class="w-icon" id="w-icon">🌡️</span><span class="w-temp" id="w-temp">—°F</span></div>
          <div class="w-desc" id="w-desc"></div>
        </div>
      </div>
      <div class="bottom-group">
        <div class="track-block">
          <div style="display:flex;align-items:center;gap:6px;min-width:0;">
            <div class="track-name" id="track-name" style="flex:1;min-width:0;"><span class="not-playing">Nothing playing</span></div>
            <button class="ctrl-btn" id="like-btn-main" onclick="toggleLike()" style="flex-shrink:0;padding:2px;">
              <svg id="like-icon" width="36" height="36" viewBox="0 0 24 24"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>
            </button>
          </div>
          <div class="track-meta" id="track-meta"></div>
        </div>
        <div class="progress-wrap">
          <div class="scrubber-track" id="scrubber-main" onmousedown="scrubStart(event,'main')" ontouchstart="scrubStart(event,'main')">
            <div class="scrubber-fill" id="fill-main"></div>
            <div class="scrubber-thumb" id="thumb-main"></div>
          </div>
          <div class="bar-times"><span id="pos-main">0:00</span><span id="dur-main">0:00</span></div>
        </div>
        <div class="bottom-row">
          <button class="lyrics-btn" id="lyrics-btn-main" onclick="goToLyrics()">
            <svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            Lyrics
          </button>
          <button class="ctrl-btn" id="queue-btn-main" onclick="toggleQueue()"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button>
          <button class="ctrl-btn" id="shuffle-btn-main" onclick="toggleShuffle()"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
          <button class="ctrl-btn" id="loop-btn-main" onclick="toggleLoop()"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
          <button id="sp-connect-btn" onclick="startSpotifyOAuth()" class="lyrics-btn" style="display:none;background:rgba(29,185,84,0.15);border-color:rgba(29,185,84,0.4);color:#1DB954;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            Connect Spotify
          </button>
          <div style="position:relative;display:flex;align-items:center;">
            <button class="vol-btn" id="vol-btn-main" onclick="toggleVolMain()"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
            <div id="vol-popup">
              <div class="vol-custom-track" id="vol-track-main" onmousedown="volScrubStart(event,'main')" ontouchstart="volScrubStart(event,'main')">
                <div class="vol-track-line"><div class="vol-custom-fill" id="vol-fill-main"></div></div>
                <div class="vol-custom-thumb" id="vol-thumb-main"></div>
              </div>
            </div>
          </div>
        </div>
        <div id="device-label" style="font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.2px;margin-top:-4px;"></div>
      </div>
    </div>
  </div>

  <!-- PAGE 2: LYRICS -->
  <div class="page" id="page-lyrics">
    <div class="lyr-left">
      <div id="art-wrap-lyrics"><svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.1)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
      <div class="lyr-track-block">
        <div class="lyr-title-row">
          <div class="lyr-track-name" id="lyr-track-name">Nothing playing</div>
          <button class="ctrl-btn" id="like-btn-lyrics" onclick="toggleLike()" style="padding:3px;flex-shrink:0;">

<script>
// ── Config ─────────────────────────────────────────────────
const HA_URL   = 'https://YOUR_HA_URL';
const TOKEN    = 'YOUR_HA_LONG_LIVED_TOKEN';
const ENTITY   = 'media_player.spotify_kt0109';
const headers  = { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };
const SP_ID    = 'YOUR_SPOTIFY_CLIENT_ID';
const SP_SEC   = 'YOUR_SPOTIFY_CLIENT_SECRET';

// ── State ──────────────────────────────────────────────────
let isPlaying = false, isShuffle = false, isLiked = false, isLoop = false;
let duration = 0, position = 0, volume = 50;
let progressInterval = null, lastArt = '', lastTrack = '';
let intervalStartPos = 0, intervalStartTime = 0;
let isDragging = false, activeScrubber = 'main';
let onLyricsPage = false, queueOpen = false;
let currentTrackId = null;

function fmt(s) { s = Math.floor(s || 0); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

function setProgress(pos, dur) {
  const pct = dur > 0 ? Math.min((pos / dur) * 100, 100) : 0;
  ['main','lyrics'].forEach(id => {
    const f = document.getElementById('fill-' + id), t = document.getElementById('thumb-' + id);
    const p = document.getElementById('pos-' + id),  d = document.getElementById('dur-' + id);
    if (f) f.style.width = pct + '%'; if (t) t.style.left = pct + '%';
    if (p) p.textContent = fmt(pos);  if (d) d.textContent = fmt(dur);
  });
}

let userRequestedLyrics = false;
function goToLyrics() {
  userRequestedLyrics = true; onLyricsPage = true;
  document.getElementById('page-main').classList.remove('active');
  document.getElementById('page-lyrics').classList.add('active');
  currentLyricIdx = -1; syncLyrics(position);
}
function goToMain() {
  userRequestedLyrics = false; onLyricsPage = false;
  document.getElementById('page-lyrics').classList.remove('active');
  document.getElementById('page-main').classList.add('active');
}

function setDeviceLabel(name) {
  const text = name ? 'Now playing on ' + name : '';
  ['device-label','device-label-lyrics'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = text; });
}

function startProgressInterval(fromPos) {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  intervalStartPos = fromPos;
  intervalStartTime = Date.now() - 250;
  progressInterval = setInterval(() => {
    const elapsed = (Date.now() - intervalStartTime) / 1000;
    position = Math.min(intervalStartPos + elapsed, duration);
    setProgress(position, duration);
    if (onLyricsPage) syncLyrics(position);
  }, 100);
}

function toggleQueue() {
  queueOpen = !queueOpen;
  document.getElementById('queue-panel').classList.toggle('open', queueOpen);
  document.getElementById('queue-backdrop').classList.toggle('open', queueOpen);
  ['queue-btn-main','queue-btn-lyrics'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.toggle('active', queueOpen); });
  if (queueOpen) fetchQueue();
}

async function fetchQueue() {
  const list = document.getElementById('queue-list');
  list.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.3);font-size:13px;">Loading…</div>';
  try {
    if (spAccessToken) { const data = await spFetch('https://api.spotify.com/v1/me/player/queue'); if (data) { renderQueue(data); return; } }
    const haResp = await fetch(`${HA_URL}/api/states/${ENTITY}`, { headers });
    const haData = await haResp.json(); const a = haData?.attributes || {};
    list.innerHTML = '';
    if (a.media_title) {
      const h = document.createElement('div');
      h.style.cssText = 'padding:12px 28px 4px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:0.8px;text-transform:uppercase;';
      h.textContent = 'Now Playing'; list.appendChild(h);
      const div = document.createElement('div'); div.className = 'queue-item';
      div.innerHTML = `<div class="queue-item-art">${a.entity_picture ? `<img src="${HA_URL + a.entity_picture}">` : ''}</div><div class="queue-item-info"><div class="queue-item-title queue-now">${a.media_title}</div><div class="queue-item-artist">${a.media_artist || ''}</div></div>`;
      list.appendChild(div);
    }
    if (!spAccessToken) {
      const btn = document.createElement('div'); btn.style.cssText = 'padding:16px 28px;';
      btn.innerHTML = '<button onclick="startSpotifyOAuth()" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;padding:10px 18px;font-size:13px;cursor:pointer;font-family:Figtree,sans-serif;">Connect Spotify for full queue</button>';
      list.appendChild(btn);
    }
  } catch(e) { document.getElementById('queue-list').innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.3);font-size:13px;">Failed to load.</div>'; }
}

function renderQueue(data) {
  const list = document.getElementById('queue-list'); list.innerHTML = '';
  const addHeader = (text) => {
    const h = document.createElement('div');
    h.style.cssText = 'padding:10px 28px 4px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:0.8px;text-transform:uppercase;';
    h.textContent = text; list.appendChild(h);
  };
  const addTrack = (track, isCurrent) => {
    const art = track.album?.images?.[0]?.url || (track.entity_picture ? HA_URL + track.entity_picture : '');
    const artist = track.artists?.map(a => a.name).join(', ') || track.media_artist || '';
    const div = document.createElement('div'); div.className = 'queue-item';
    div.innerHTML = `<div class="queue-item-art">${art ? `<img src="${art}">` : ''}</div><div class="queue-item-info"><div class="queue-item-title ${isCurrent ? 'queue-now' : ''}">${track.name || track.media_title || ''}</div><div class="queue-item-artist">${artist}</div></div>`;
    list.appendChild(div);
  };
  if (data.currently_playing) { addHeader('Now Playing'); addTrack(data.currently_playing, true); }
  if (data.queue?.length) { addHeader('Next Up'); data.queue.slice(0, 12).forEach(t => addTrack(t, false)); }
}

function updateClock() {
  const now = new Date(); let h = now.getHours(); const m = now.getMinutes().toString().padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; const t = h + ':' + m + ' ' + ampm;
  document.getElementById('time').textContent = t; document.getElementById('lyr-time').textContent = t;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
}

const WMO_CODE = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',77:'🌨️',80:'🌦️',81:'🌧️',82:'🌧️',85:'❄️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WMO_DESC = {0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Foggy',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Rain showers',81:'Rain showers',82:'Heavy showers',85:'Snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
async function updateWeather() {
  const icon = document.getElementById('w-icon'), temp = document.getElementById('w-temp'), desc = document.getElementById('w-desc');
  if (!icon || !temp || !navigator.geolocation) { if(icon) icon.textContent=''; if(temp) temp.textContent=''; if(desc) desc.textContent=''; return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const {latitude:lat,longitude:lon} = pos.coords;
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`);
      const d = await r.json(); const t = Math.round(d.current.temperature_2m); const wmo = d.current.weather_code;
      icon.textContent = WMO_CODE[wmo]||'🌡️'; temp.textContent = t+'°F'; desc.textContent = WMO_DESC[wmo]||'';
    } catch(e) {}
  }, () => { icon.textContent=''; temp.textContent=''; desc.textContent=''; }, { timeout: 8000 });
}

function applyPlayUI() {
  const path = isPlaying ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  ['play-icon','play-icon-lyrics'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = path; });
}
function applyShuffleUI() { ['shuffle-btn-main','shuffle-btn-lyrics'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.toggle('shuffle-on', isShuffle); }); }
function applyLoopUI()    { ['loop-btn-main','loop-btn-lyrics'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.toggle('loop-on', isLoop); }); }
const HEART_OUTLINE = `<path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/>`;
const HEART_FILLED  = `<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>`;
function applyLikeUI() {
  [['like-btn-main','like-icon'],['like-btn-lyrics','like-icon-lyrics']].forEach(([btn, ico]) => {
    const b = document.getElementById(btn), i = document.getElementById(ico);
    if (b) b.classList.toggle('liked', isLiked); if (i) i.innerHTML = isLiked ? HEART_FILLED : HEART_OUTLINE;
  });
}
function setArt(url) {
  const img = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  ['art-wrap','art-wrap-lyrics'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = img; });
  document.getElementById('bg').style.backgroundImage = `url('${url}')`;
}

// ── Spotify OAuth ───────────────────────────────────────────
const SP_REDIRECT = 'https://YOUR_REDIRECT_URI';
const SP_SCOPES   = 'user-read-playback-state user-read-currently-playing user-library-read user-library-modify user-modify-playback-state';
let spAccessToken  = localStorage.getItem('sp_access_token')  || null;
let spRefreshToken = localStorage.getItem('sp_refresh_token') || null;
let spTokenExpiry  = parseInt(localStorage.getItem('sp_token_expiry') || '0');
const spScopesStored = localStorage.getItem('sp_scopes') || '';
if (spScopesStored !== SP_SCOPES) {
  spAccessToken = null; spRefreshToken = null; spTokenExpiry = 0;
  localStorage.removeItem('sp_access_token'); localStorage.removeItem('sp_refresh_token'); localStorage.removeItem('sp_token_expiry');
}

function startSpotifyOAuth() {
  const state = Math.random().toString(36).slice(2);
  localStorage.setItem('sp_oauth_state', state);
  const params = new URLSearchParams({ client_id: SP_ID, response_type: 'code', redirect_uri: SP_REDIRECT, scope: SP_SCOPES, state });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params;
}
async function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code'), state = params.get('state');
  if (!code || state !== localStorage.getItem('sp_oauth_state')) return;
  const creds = btoa(SP_ID + ':' + SP_SEC);
  const r = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Authorization': 'Basic ' + creds, 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ grant_type: 'authorization_code', code, redirect_uri: SP_REDIRECT }) });
  if (r.ok) saveSpotifyTokens(await r.json());
  window.history.replaceState({}, '', window.location.pathname);
}
async function refreshSpotifyToken() {
  if (!spRefreshToken) return false;
  const creds = btoa(SP_ID + ':' + SP_SEC);
  const r = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Authorization': 'Basic ' + creds, 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: spRefreshToken }) });
  if (r.ok) { saveSpotifyTokens(await r.json()); return true; } return false;
}
function saveSpotifyTokens(d) {
  spAccessToken = d.access_token; if (d.refresh_token) spRefreshToken = d.refresh_token;
  spTokenExpiry = Date.now() + (d.expires_in - 60) * 1000;
  localStorage.setItem('sp_access_token', spAccessToken); localStorage.setItem('sp_refresh_token', spRefreshToken);
  localStorage.setItem('sp_token_expiry', spTokenExpiry); localStorage.setItem('sp_scopes', SP_SCOPES);
  document.getElementById('sp-connect-btn')?.style.setProperty('display','none');
}
async function spFetch(url, method = 'GET', body = null) {
  if (!spAccessToken) return null;
  if (Date.now() > spTokenExpiry) { const ok = await refreshSpotifyToken(); if (!ok) return null; }
  const opts = { method, headers: { 'Authorization': 'Bearer ' + spAccessToken } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(url, opts);
  if (r.status === 401) { await refreshSpotifyToken(); return null; }
  if (r.status === 204 || !r.ok) return null;
  return r.json();
}
